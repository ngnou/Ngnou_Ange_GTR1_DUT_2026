<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact-Mon mini-site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Page de contact</h1>
  </header>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="presentation.html">Présentation</a>
    <a href="contact.html">Contact</a>
  </nav>
   <div class="container">
     <main>
        <h2>Formulaire de contact</h2>
        <p>veuillez remplir ce formulaire pour envoyer un message</p>
     </main>
     <aside>
  <form>
        <label for="nom">Nom:</label>
        <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required>
        <br>
        <br>
        <label for="prenom">Prénom:</label>
        <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prénom" required>
        <br>
        <br>
        <label for="email">Adresse email :</label>
        <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
        <br>
        <br>
        <label for="telephone">Téléphone :</label>
        <input type="tel" id="telephone" name="telephone" placeholder="+237 6 xx xx xx xx">
        <br>
        <br>
        <label for="domaine">Domaine d'intéret :</label>
       <select name="domaine" id="domaine" required>
         <option value="">--Choisir un domaine--</option>
         <option value="reseaux">Réseaux informatique</option>
         <option value="cybersecurite">Cybersécurité</option>
         <option value="developpement-web"> Développement web</option>
         <option value="administration-systeme">Administration système</option>
        </select>
          <br>
          <br>
          <label for="motif">Motif du message :</label>
        <select name="motif" id="motif" required>
          <option value="">-- Choisir un motif--</option>
          <option value="information">Demande d'information</option>
          <option value="stage">Demande de stage</option>
          <option value="projet">Proposition de projet</option>
          <option value="autre">Autre demande</option>
        </select>
          <br>
          <br>
          <p>Statut du visiteur :</p>
          <input type="radio" id="etudiant" name="statut" value="etudiant" required>
         <label for="etudiant">Étudiant</label>
         <br>
         <input type="radio" id="enseigant" name="statut" value="enseigant"> 
         <label for="enseignant">Enseigant</label>
         <br>
         <input type="radio" id="professionnel" name="statut" value="professionnel">
         <label for="professionnel">Professionnel</label>
         <br>
         <br>
         <label for="message">Message :</label>
         <br>
         <textarea name="message" id="message" rows="5" cols="40" placeholder="Écrivez votre message ici" required></textarea>
         <br>
         <br>
         <input type="checkbox" id="confirmation" name="confirmation" required>
         <label for="confirmation">Je confirme que les informations saisie sont correcte</label>
         <br>
         <br>
     </aside>
    </div>
    <footer>
       <button type="submit">Envoyer</button>
</form>
    </footer>
</body>
</html>
